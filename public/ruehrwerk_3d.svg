<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-labelledby="title desc">

  <title id="title">Rührwerk mit leichtem 3D-Effekt</title>
  <desc id="desc">Dunkles Rührwerk mit unterschiedlich schattierten Seitenpaddeln und dezenten Lichtkanten.</desc>

  <defs>
    <!-- Hauptachse -->
    <linearGradient id="shaftGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26313b"/>
      <stop offset="42%" stop-color="#465563"/>
      <stop offset="62%" stop-color="#34414d"/>
      <stop offset="100%" stop-color="#202932"/>
    </linearGradient>

    <!-- Linkes Paddel: etwas dunkler -->
    <linearGradient id="leftBladeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#52606d"/>
      <stop offset="45%" stop-color="#394652"/>
      <stop offset="100%" stop-color="#26313a"/>
    </linearGradient>

    <!-- Rechtes Paddel: etwas heller -->
    <linearGradient id="rightBladeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#73808c"/>
      <stop offset="50%" stop-color="#596673"/>
      <stop offset="100%" stop-color="#3e4b57"/>
    </linearGradient>

    <!-- Nabe -->
    <radialGradient id="hubGradient" cx="35%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#5b6875"/>
      <stop offset="45%" stop-color="#3d4a56"/>
      <stop offset="100%" stop-color="#222c35"/>
    </radialGradient>

    <!-- Dezente Schatten -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4"
                    flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <!-- Lichtkante -->
    <linearGradient id="edgeHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Achse -->
    <rect x="244" y="70" width="24" height="286" rx="12"
          fill="url(#shaftGradient)"
          stroke="#202a33"
          stroke-width="2"/>

    <!-- dezente Lichtkante auf der Achse -->
    <rect x="248" y="76" width="5" height="274" rx="2.5"
          fill="#ffffff"
          opacity="0.10"/>

    <!-- Linkes Paddel -->
    <path d="
      M232 348
      L112 338
      Q92 336 92 358
      L92 390
      Q92 412 112 410
      L232 400
      Z"
      fill="url(#leftBladeGradient)"
      stroke="#202a33"
      stroke-width="4"
      stroke-linejoin="round"/>

    <!-- Rechtes Paddel -->
    <path d="
      M280 348
      L400 338
      Q420 336 420 358
      L420 390
      Q420 412 400 410
      L280 400
      Z"
      fill="url(#rightBladeGradient)"
      stroke="#202a33"
      stroke-width="4"
      stroke-linejoin="round"/>

    <!-- obere Lichtflächen der Paddel -->
    <path d="
      M228 351
      L112 342
      Q99 341 98 353
      L98 359
      L228 370
      Z"
      fill="url(#edgeHighlight)"
      opacity="0.45"/>

    <path d="
      M284 351
      L400 342
      Q413 341 414 353
      L414 359
      L284 370
      Z"
      fill="url(#edgeHighlight)"
      opacity="0.55"/>

    <!-- Mittelpunkt / Nabe -->
    <rect x="226" y="328" width="60" height="76" rx="20"
          fill="url(#hubGradient)"
          stroke="#202a33"
          stroke-width="3"/>

    <!-- Lichtreflex auf der Nabe -->
    <path d="
      M239 337
      Q232 342 232 351
      L232 365
      Q239 348 254 343
      Q266 339 277 344
      Q271 335 259 333
      Q247 331 239 337
      Z"
      fill="#ffffff"
      opacity="0.12"/>
  </g>
</svg>
